<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>미소주유소 월간 보고서</title>
  <meta name="description" content="미소주유소 월간 종합 경영현황">
  <meta property="og:title" content="미소주유소 월간 보고서">
  <meta property="og:description" content="유종별 매출, 영업이익, 고객현황 종합보고">
  <meta property="og:type" content="website">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      font-size: 14px;
    }
    header {
      background: #1e293b;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 16px; font-weight: 700; color: #f8fafc; }
    .version { font-size: 11px; color: #64748b; }
    .toolbar {
      background: #1e293b;
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #334155;
    }
    .toolbar select, .toolbar button {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #334155;
      color: #e2e8f0;
      font-size: 13px;
    }
    .toolbar button { background: #3b82f6; border-color: #3b82f6; cursor: pointer; font-weight: 600; }
    .toolbar button:active { background: #2563eb; }
    .refresh-btn { background: #0f172a !important; border-color: #475569 !important; color: #94a3b8 !important; font-size: 12px !important; }
    main { padding: 12px; }

    /* KPI 카드 */
    .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
    .kpi-card { background: #1e293b; border-radius: 10px; padding: 12px; border: 1px solid #334155; }
    .kpi-label { font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
    .kpi-value { font-size: 16px; font-weight: 700; color: #f8fafc; word-break: keep-all; }
    .kpi-value.pos { color: #4ade80; }
    .kpi-value.neg { color: #f87171; }

    /* 섹션 카드 */
    .card { background: #1e293b; border-radius: 10px; border: 1px solid #334155; margin-bottom: 12px; overflow: hidden; }
    .card-head { padding: 11px 14px 9px; font-size: 13px; font-weight: 700; color: #94a3b8; border-bottom: 1px solid #334155; }

    /* 유종별 판매 테이블 */
    .fuel-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .fuel-table th { padding: 7px 10px; text-align: right; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; white-space: nowrap; }
    .fuel-table th:first-child { text-align: left; }
    .fuel-table td { padding: 8px 10px; text-align: right; border-bottom: 1px solid #1e3a5f22; color: #cbd5e1; }
    .fuel-table td:first-child { text-align: left; font-weight: 600; color: #f8fafc; }
    .fuel-table tr.total-row td { background: #334155; font-weight: 700; border-top: 1px solid #475569; border-bottom: none; }
    .pos { color: #4ade80; }
    .neg { color: #f87171; }

    /* 지출 Top5 */
    .top5-row { padding: 9px 14px; border-bottom: 1px solid #0f172a; }
    .top5-row:last-child { border-bottom: none; }
    .top5-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .top5-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .top5-amt { font-size: 13px; font-weight: 700; color: #60a5fa; }
    .bar-bg { background: #334155; border-radius: 3px; height: 4px; }
    .bar-fill { background: #3b82f6; border-radius: 3px; height: 4px; }

    /* 고객 Top5 */
    .cust-row { padding: 9px 14px; border-bottom: 1px solid #0f172a; }
    .cust-row:last-child { border-bottom: none; }
    .cust-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .cust-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .cust-amt  { font-size: 13px; font-weight: 700; color: #f8fafc; }
    .cust-detail { font-size: 11px; color: #64748b; display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }

    .empty { padding: 24px; text-align: center; color: #475569; font-size: 13px; }
    .loading { padding: 24px; text-align: center; color: #64748b; }

    @media (max-width: 360px) { .kpi-value { font-size: 14px; } }
  </style>
</head>
<body>

<header>
  <div class="logo">⛽ 미소주유소</div>
  <span class="version" id="ver"></span>
</header>

<div class="toolbar">
  <select id="m-year"></select>
  <span style="color:#94a3b8;">년</span>
  <select id="m-month"></select>
  <span style="color:#94a3b8;">월</span>
  <button onclick="loadData()">조회</button>
  <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
</div>

<main id="main">
  <div class="loading">데이터 불러오는 중…</div>
</main>

<script>
const $ = id => document.getElementById(id);

(function init() {
  const now = new Date();
  const selY = $('m-year'), selM = $('m-month');
  for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '년';
    if (y === now.getFullYear()) o.selected = true;
    selY.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m + '월';
    if (m === now.getMonth() + 1) o.selected = true;
    selM.appendChild(o);
  }
  fetch('/api/version').then(r=>r.json()).then(d => { $('ver').textContent = 'v' + d.version; }).catch(()=>{});
  loadData();
})();

function fmtW(n) { return n == null ? '-' : Math.round(n).toLocaleString() + '원'; }
function fmtL(n) { return n == null ? '-' : Math.floor(n).toLocaleString() + 'L'; }

async function loadData() {
  const year  = $('m-year').value;
  const month = String($('m-month').value).padStart(2, '0');
  const ym    = `${year}-${month}`;
  $('main').innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res  = await fetch(`/api/summary/${ym}`);
    const data = await res.json();
    if (!data.ok) { $('main').innerHTML = '<div class="empty">데이터 오류</div>'; return; }
    render(data, year, $('m-month').value);
  } catch(e) {
    $('main').innerHTML = '<div class="empty">서버에 연결할 수 없습니다</div>';
  }
}

function render(d, year, month) {
  const revenue   = d.revenue   || 0;
  const profit    = d.profit;
  const expense   = d.expense   || 0;
  const netProfit = d.netProfit;
  const cost      = profit != null ? revenue - profit : null;
  const margin    = netProfit != null && revenue > 0 ? (netProfit / revenue * 100).toFixed(1) + '%' : '-';

  // KPI 6개
  const kpiRows = [
    { label: '총 매출',   value: fmtW(revenue),   cls: '' },
    { label: '매입원가',  value: fmtW(cost),       cls: '' },
    { label: '영업이익',  value: fmtW(profit),     cls: profit == null ? '' : profit >= 0 ? 'pos' : 'neg' },
    { label: '지출',      value: fmtW(expense),    cls: '' },
    { label: '순이익',    value: fmtW(netProfit),  cls: netProfit == null ? '' : netProfit >= 0 ? 'pos' : 'neg' },
    { label: '순이익률',  value: margin,            cls: netProfit == null ? '' : netProfit >= 0 ? 'pos' : 'neg' },
  ];
  let kpiHtml = '<div class="kpi-grid">';
  kpiRows.forEach(k => {
    kpiHtml += `<div class="kpi-card"><div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${k.value}</div></div>`;
  });
  kpiHtml += '</div>';

  // 유종별 판매 테이블
  const FUELS = [
    { key: '경유',   color: '#60a5fa' },
    { key: '휘발유', color: '#fb923c' },
    { key: '등유',   color: '#4ade80' },
  ];
  let salesRows = '';
  FUELS.forEach(({ key, color }) => {
    const amt    = d.sales?.[key]  || 0;
    const qty    = d.qty?.[key]    || 0;
    const drums  = Math.floor(qty / 200);
    const avgSell = qty > 0 ? Math.round(amt / qty) : null;
    const avgBuy  = d.avgBuyPriceByFuel?.[key] || null;
    const fp      = d.profitByFuel?.[key] ?? null;
    const fpPct   = fp != null && amt > 0 ? (fp / amt * 100).toFixed(1) + '%' : '-';
    const fpClass = fp == null ? '' : fp >= 0 ? 'pos' : 'neg';
    salesRows += `<tr>
      <td style="color:${color};">${key}</td>
      <td>${qty > 0 ? `${Math.floor(qty).toLocaleString()}L<br><span style="color:#64748b;font-size:10px;">(${drums}드럼)</span>` : '-'}</td>
      <td>${avgSell ? avgSell.toLocaleString()+'원' : '-'}</td>
      <td>${avgBuy  ? avgBuy.toLocaleString()+'원'  : '-'}</td>
      <td class="${fpClass}">${fp != null ? `${fp.toLocaleString()}원<br><span style="font-size:10px;">(${fpPct})</span>` : '-'}</td>
    </tr>`;
  });
  const etcAmt = (d.sales?.carwash || 0) + (d.sales?.others || 0);
  salesRows += `<tr class="total-row">
    <td>합계</td><td>-</td><td>-</td><td>-</td>
    <td class="${profit == null ? '' : profit >= 0 ? 'pos' : 'neg'}">${fmtW(profit)}</td>
  </tr>`;
  const salesHtml = `<div class="card">
    <div class="card-head">유종별 판매 현황</div>
    <div style="overflow-x:auto;">
      <table class="fuel-table">
        <thead><tr>
          <th>유종</th><th>판매량</th><th>판매가</th><th>매입가</th><th>영업이익</th>
        </tr></thead>
        <tbody>${salesRows}</tbody>
      </table>
    </div>
    ${etcAmt > 0 ? `<div style="padding:8px 12px;font-size:12px;color:#64748b;border-top:1px solid #334155;">세차+유외상품 ${fmtW(etcAmt)}</div>` : ''}
  </div>`;

  // 지출 Top5
  let expHtml = '<div class="card"><div class="card-head">지출 Top 5</div>';
  if (d.expenseTop5?.length) {
    const maxAmt = d.expenseTop5[0].amount;
    d.expenseTop5.forEach((e, i) => {
      const barPct = maxAmt > 0 ? (e.amount / maxAmt * 100).toFixed(0) : 0;
      expHtml += `<div class="top5-row">
        <div class="top5-header">
          <span class="top5-name">${i+1}. ${e.name}</span>
          <span class="top5-amt">${e.amount.toLocaleString()}원</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${barPct}%;"></div></div>
      </div>`;
    });
  } else {
    expHtml += '<div class="empty">지출 데이터 없음</div>';
  }
  expHtml += '</div>';

  // 고객 Top5 공통 렌더 함수
  function renderTop5Card(title, list) {
    let html = `<div class="card"><div class="card-head">${title}</div>`;
    if (list?.length) {
      list.forEach((c, i) => {
        const fpClass = (c.profit ?? 0) >= 0 ? 'pos' : 'neg';
        html += `<div class="cust-row">
          <div class="cust-header">
            <span class="cust-name">${i+1}. ${c.name}</span>
            <span class="cust-amt">${Math.round(c.amount).toLocaleString()}원</span>
          </div>
          <div class="cust-detail">
            <span>${c.qty ? c.qty.toLocaleString()+'L' : '-'}</span>
            <span>판매가 ${c.avgSellPrice ? c.avgSellPrice.toLocaleString()+'원' : '-'}</span>
            <span class="${fpClass}">이익 ${c.profit != null ? Math.round(c.profit).toLocaleString()+'원' : '-'} (${c.profitPct ?? '-'}%)</span>
          </div>
        </div>`;
      });
    } else {
      html += '<div class="empty">데이터 없음</div>';
    }
    return html + '</div>';
  }

  $('main').innerHTML = `
    <div style="padding:8px 0 4px;font-size:12px;color:#475569;text-align:center;">${year}년 ${month}월 종합현황</div>
    ${kpiHtml}
    ${salesHtml}
    ${expHtml}
    ${renderTop5Card('외상 고객 Top 5', d.customerTop5)}
    ${renderTop5Card('카드 고객 Top 5', d.cardTop5)}
  `;
}
</script>
</body>
</html>
