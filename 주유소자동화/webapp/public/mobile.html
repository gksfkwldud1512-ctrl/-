<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>미소주유소 월간 보고서</title>
  <meta name="description" content="미소주유소 월간 종합 경영현황">
  <meta property="og:title" content="미소주유소 월간 보고서">
  <meta property="og:description" content="유종별 매출, 영업이익, 고객현황 종합보고">
  <meta property="og:type" content="website">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; font-size: 14px; padding-bottom: 60px; }

    /* 헤더 */
    header { background: #1e293b; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 20; }
    .logo { font-size: 15px; font-weight: 700; color: #f8fafc; }
    .sub  { font-size: 11px; color: #64748b; text-align: right; line-height: 1.4; }

    /* 월 선택 툴바 */
    .toolbar { background: #1e293b; padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #334155; }
    .toolbar select, .toolbar button { padding: 5px 10px; border-radius: 6px; border: 1px solid #475569; background: #334155; color: #e2e8f0; font-size: 13px; }
    .toolbar button { background: #3b82f6; border-color: #3b82f6; cursor: pointer; font-weight: 600; }
    .toolbar button:active { background: #2563eb; }
    .refresh-btn { background: #0f172a !important; border-color: #475569 !important; color: #94a3b8 !important; font-size: 12px !important; }

    /* 하단 탭 네비게이션 */
    .tab-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; z-index: 30; }
    .tab-nav-btn { flex: 1; padding: 10px 6px 8px; background: none; border: none; color: #64748b; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: inherit; transition: color .15s; }
    .tab-nav-btn .icon { font-size: 18px; }
    .tab-nav-btn.active { color: #3b82f6; border-top: 2px solid #3b82f6; }

    /* 탭 패널 */
    .panel { display: none; padding: 12px; }
    .panel.active { display: block; }

    /* KPI 카드 */
    .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
    .kpi-card { background: #1e293b; border-radius: 10px; padding: 12px; border: 1px solid #334155; }
    .kpi-label { font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
    .kpi-value { font-size: 16px; font-weight: 700; color: #f8fafc; word-break: keep-all; }
    .kpi-value.pos { color: #4ade80; } .kpi-value.neg { color: #f87171; }

    /* 섹션 카드 */
    .card { background: #1e293b; border-radius: 10px; border: 1px solid #334155; margin-bottom: 12px; overflow: hidden; }
    .card-head { padding: 11px 14px 9px; font-size: 13px; font-weight: 700; color: #94a3b8; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    .card-head-amt { font-size: 13px; font-weight: 700; color: #f8fafc; }

    /* 유종별 판매 테이블 */
    .fuel-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .fuel-table th { padding: 7px 8px; text-align: right; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; white-space: nowrap; }
    .fuel-table th:first-child { text-align: left; }
    .fuel-table td { padding: 8px 8px; text-align: right; border-bottom: 1px solid #1e3a5f22; color: #cbd5e1; white-space: nowrap; font-size: 12px; }
    .fuel-table td:first-child { text-align: left; font-weight: 600; color: #f8fafc; }
    .fuel-table tr.total-row td { background: #334155; font-weight: 700; border-top: 1px solid #475569; border-bottom: none; }
    .pos { color: #4ade80; } .neg { color: #f87171; }

    /* Top5 공통 */
    .top5-row { padding: 9px 14px; border-bottom: 1px solid #0f172a; }
    .top5-row:last-child { border-bottom: none; }
    .top5-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .top5-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .top5-amt  { font-size: 13px; font-weight: 700; color: #60a5fa; }
    .bar-bg  { background: #334155; border-radius: 3px; height: 4px; }
    .bar-fill { background: #3b82f6; border-radius: 3px; height: 4px; }
    .cust-row { padding: 9px 14px; border-bottom: 1px solid #0f172a; }
    .cust-row:last-child { border-bottom: none; }
    .cust-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .cust-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .cust-amt  { font-size: 13px; font-weight: 700; color: #f8fafc; }
    .cust-detail { font-size: 11px; color: #64748b; display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }

    /* 지출 목록 */
    .exp-cat-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .exp-cat-name   { font-size: 13px; font-weight: 700; color: #e2e8f0; }
    .exp-cat-amt    { font-size: 13px; font-weight: 700; color: #f87171; }
    .exp-items      { display: none; background: #0f172a; }
    .exp-items.open { display: block; }
    .exp-item { padding: 7px 14px 7px 24px; display: flex; justify-content: space-between; border-top: 1px solid #1e293b; }
    .exp-item-left  { font-size: 12px; color: #94a3b8; }
    .exp-item-date  { font-size: 10px; color: #475569; }
    .exp-item-amt   { font-size: 12px; color: #fca5a5; font-weight: 600; white-space: nowrap; }

    /* 고객 목록 필터 */
    .filter-bar { padding: 8px 12px; display: flex; gap: 6px; border-bottom: 1px solid #334155; background: #1e293b; flex-wrap: wrap; }
    .m-filter { padding: 4px 12px; border-radius: 16px; border: 1px solid #475569; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; }
    .m-filter.active { background: #3b82f6; border-color: #3b82f6; color: #fff; font-weight: 600; }

    /* 고객 목록 테이블 */
    .cust-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .cust-table th { padding: 7px 8px; text-align: right; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; white-space: nowrap; background: #0f172a; position: sticky; top: 0; }
    .cust-table th:nth-child(1), .cust-table th:nth-child(2) { text-align: center; }
    .cust-table td { padding: 8px 8px; text-align: right; border-bottom: 1px solid #1e293b; color: #cbd5e1; white-space: nowrap; font-size: 12px; }
    .cust-table td:nth-child(1) { text-align: center; color: #475569; font-size: 11px; }
    .cust-table td:nth-child(2) { text-align: left; font-weight: 600; color: #f8fafc; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
    .badge-c { background: #dbeafe; color: #1e40af; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
    .badge-k { background: #fce7f3; color: #9d174d; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
    .badge-h { background: #f3f4f6; color: #374151; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }

    .empty   { padding: 32px; text-align: center; color: #475569; font-size: 13px; }
    .loading { padding: 24px; text-align: center; color: #64748b; }
    .section-label { padding: 6px 12px 2px; font-size: 11px; color: #475569; }

    @media (max-width: 360px) { .kpi-value { font-size: 14px; } }
  </style>
</head>
<body>

<header>
  <div class="logo">⛽ 미소주유소</div>
  <div class="sub" id="header-sub">월간 보고서</div>
</header>

<div class="toolbar">
  <select id="m-year"></select>
  <span style="color:#94a3b8;">년</span>
  <select id="m-month"></select>
  <span style="color:#94a3b8;">월</span>
  <button onclick="loadAll()">조회</button>
  <button class="refresh-btn" onclick="loadAll()">🔄</button>
</div>

<!-- 탭 패널 -->
<div id="panel-summary" class="panel active">
  <div class="loading">데이터 불러오는 중…</div>
</div>
<div id="panel-expense" class="panel">
  <div class="loading">탭을 선택하면 불러옵니다</div>
</div>
<div id="panel-customer" class="panel">
  <div class="loading">탭을 선택하면 불러옵니다</div>
</div>

<!-- 하단 탭 네비게이션 -->
<nav class="tab-nav">
  <button class="tab-nav-btn active" onclick="switchTab('summary')">
    <span class="icon">📊</span>종합
  </button>
  <button class="tab-nav-btn" onclick="switchTab('expense')">
    <span class="icon">💰</span>지출내역
  </button>
  <button class="tab-nav-btn" onclick="switchTab('customer')">
    <span class="icon">👥</span>고객현황
  </button>
</nav>

<script>
const $ = id => document.getElementById(id);
const state = { year: 0, month: 0, summary: null, expenses: null, customers: null, avgBuy: {}, custFilter: '전체' };

(function init() {
  const now = new Date();
  const selY = $('m-year'), selM = $('m-month');
  for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 1; y++) {
    const o = document.createElement('option'); o.value = y; o.textContent = y + '년';
    if (y === now.getFullYear()) o.selected = true;
    selY.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option'); o.value = m; o.textContent = m + '월';
    if (m === now.getMonth() + 1) o.selected = true;
    selM.appendChild(o);
  }
  state.year  = now.getFullYear();
  state.month = now.getMonth() + 1;
  fetch('/api/version').then(r=>r.json()).then(d => {}).catch(()=>{});
  loadAll();
})();

function fmtW(n) { return n == null ? '-' : Math.round(n).toLocaleString() + '원'; }
function fmtL(n) { return n == null || n === 0 ? '-' : Math.floor(n).toLocaleString() + 'L'; }
function ym()   { return `${$('m-year').value}-${String($('m-month').value).padStart(2,'0')}`; }

// ── 탭 전환 ─────────────────────────────────────────────────
let activeTab = 'summary';
function switchTab(tab) {
  activeTab = tab;
  ['summary','expense','customer'].forEach(t => {
    $('panel-' + t).classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.tab-nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['summary','expense','customer'][i] === tab);
  });
  if (tab === 'expense'  && !state.expenses)  loadExpenses();
  if (tab === 'customer' && !state.customers) loadCustomers();
}

// ── 전체 조회 ───────────────────────────────────────────────
async function loadAll() {
  state.year  = +$('m-year').value;
  state.month = +$('m-month').value;
  state.summary   = null;
  state.expenses  = null;
  state.customers = null;
  $('header-sub').textContent = `${state.year}년 ${state.month}월 보고서`;
  $('panel-summary').innerHTML  = '<div class="loading">불러오는 중…</div>';
  $('panel-expense').innerHTML  = '<div class="loading">탭을 선택하면 불러옵니다</div>';
  $('panel-customer').innerHTML = '<div class="loading">탭을 선택하면 불러옵니다</div>';

  await loadSummary();
  if (activeTab === 'expense')  loadExpenses();
  if (activeTab === 'customer') loadCustomers();
}

// ── 종합 ────────────────────────────────────────────────────
async function loadSummary() {
  try {
    const res  = await fetch(`/api/summary/${ym()}`);
    const data = await res.json();
    if (!data.ok) { $('panel-summary').innerHTML = '<div class="empty">데이터 오류</div>'; return; }
    state.summary = data;
    state.avgBuy  = data.avgBuyPriceByFuel || {};
    renderSummary(data);
  } catch(e) {
    $('panel-summary').innerHTML = '<div class="empty">서버에 연결할 수 없습니다</div>';
  }
}

function renderSummary(d) {
  const revenue = d.revenue || 0, profit = d.profit, expense = d.expense || 0, netProfit = d.netProfit;
  const cost   = profit != null ? revenue - profit : null;
  const margin = netProfit != null && revenue > 0 ? (netProfit / revenue * 100).toFixed(1) + '%' : '-';

  const kpiItems = [
    ['총 매출', fmtW(revenue), ''],
    ['매입원가', fmtW(cost), ''],
    ['영업이익', fmtW(profit), profit == null ? '' : profit >= 0 ? 'pos' : 'neg'],
    ['지출', fmtW(expense), ''],
    ['순이익', fmtW(netProfit), netProfit == null ? '' : netProfit >= 0 ? 'pos' : 'neg'],
    ['순이익률', margin, netProfit == null ? '' : netProfit >= 0 ? 'pos' : 'neg'],
  ];
  let html = '<div class="kpi-grid">';
  kpiItems.forEach(([label, value, cls]) => {
    html += `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value ${cls}">${value}</div></div>`;
  });
  html += '</div>';

  // 유종별 판매
  const FUELS = [['경유','#60a5fa'],['휘발유','#fb923c'],['등유','#4ade80']];
  let salesRows = '', totalFuelQty = 0;
  FUELS.forEach(([key, color]) => {
    const amt = d.sales?.[key] || 0, qty = d.qty?.[key] || 0;
    const drums = Math.floor(qty / 200);
    totalFuelQty += qty;
    const avgSell = qty > 0 ? Math.round(amt / qty) : null;
    const avgBuy  = d.avgBuyPriceByFuel?.[key] || null;
    const fp      = d.profitByFuel?.[key] ?? null;
    const fpPct   = fp != null && amt > 0 ? (fp / amt * 100).toFixed(1) + '%' : '-';
    const fpClass = fp == null ? '' : fp >= 0 ? 'pos' : 'neg';
    salesRows += `<tr>
      <td style="color:${color};">${key}</td>
      <td>${qty > 0 ? `${Math.floor(qty).toLocaleString()}L <span style="color:#64748b;font-size:10px;">(${drums}드럼)</span>` : '-'}</td>
      <td>${avgSell ? avgSell.toLocaleString()+'원' : '-'}</td>
      <td>${avgBuy  ? avgBuy.toLocaleString()+'원'  : '-'}</td>
      <td class="${fpClass}">${fp != null ? `${Math.round(fp).toLocaleString()}원 <span style="font-size:10px;">(${fpPct})</span>` : '-'}</td>
    </tr>`;
  });
  const etcAmt   = (d.sales?.carwash || 0) + (d.sales?.others || 0);
  const totDrums = Math.floor(totalFuelQty / 200);
  salesRows += `<tr class="total-row">
    <td>합계</td>
    <td>${Math.floor(totalFuelQty).toLocaleString()}L <span style="font-size:10px;color:#94a3b8;">(${totDrums}드럼)</span></td>
    <td>-</td><td>-</td>
    <td class="${profit == null ? '' : profit >= 0 ? 'pos' : 'neg'}">${fmtW(profit)}</td>
  </tr>`;
  html += `<div class="card">
    <div class="card-head">유종별 판매 현황</div>
    <div style="overflow-x:auto;">
      <table class="fuel-table">
        <thead><tr><th>유종</th><th>판매량</th><th>판매가</th><th>매입가</th><th>영업이익</th></tr></thead>
        <tbody>${salesRows}</tbody>
      </table>
    </div>
    ${etcAmt > 0 ? `<div style="padding:8px 12px;font-size:12px;color:#64748b;border-top:1px solid #334155;">세차+유외상품 ${fmtW(etcAmt)}</div>` : ''}
  </div>`;

  // 지출 Top5
  let expH = '<div class="card"><div class="card-head">지출 Top 5 <span style="font-size:11px;color:#475569;cursor:pointer;" onclick="switchTab(\'expense\')">전체보기 →</span></div>';
  if (d.expenseTop5?.length) {
    const maxA = d.expenseTop5[0].amount;
    d.expenseTop5.forEach((e, i) => {
      const bp = maxA > 0 ? (e.amount / maxA * 100).toFixed(0) : 0;
      expH += `<div class="top5-row"><div class="top5-header"><span class="top5-name">${i+1}. ${e.name}</span><span class="top5-amt">${e.amount.toLocaleString()}원</span></div><div class="bar-bg"><div class="bar-fill" style="width:${bp}%;"></div></div></div>`;
    });
  } else expH += '<div class="empty">지출 데이터 없음</div>';
  expH += '</div>';
  html += expH;

  // Top5 카드 공통
  function top5Card(title, list, linkTab) {
    let h = `<div class="card"><div class="card-head">${title} <span style="font-size:11px;color:#475569;cursor:pointer;" onclick="switchTab('${linkTab}')">전체보기 →</span></div>`;
    if (list?.length) {
      list.forEach((c, i) => {
        const cls = (c.profit ?? 0) >= 0 ? 'pos' : 'neg';
        h += `<div class="cust-row"><div class="cust-header"><span class="cust-name">${i+1}. ${c.name}</span><span class="cust-amt">${Math.round(c.amount).toLocaleString()}원</span></div>
          <div class="cust-detail"><span>${c.qty ? c.qty.toLocaleString()+'L' : '-'}</span><span>판매가 ${c.avgSellPrice ? c.avgSellPrice.toLocaleString()+'원' : '-'}</span><span class="${cls}">이익 ${c.profit != null ? Math.round(c.profit).toLocaleString()+'원' : '-'} (${c.profitPct ?? '-'}%)</span></div></div>`;
      });
    } else h += '<div class="empty">데이터 없음</div>';
    return h + '</div>';
  }
  html += top5Card('외상 고객 Top 5', d.customerTop5, 'customer');
  html += top5Card('카드 고객 Top 5', d.cardTop5, 'customer');

  $('panel-summary').innerHTML = html;
}

// ── 지출 내역 ───────────────────────────────────────────────
async function loadExpenses() {
  if (state.expenses) { renderExpenses(state.expenses); return; }
  $('panel-expense').innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res  = await fetch(`/api/expenses?month=${ym()}`);
    const data = await res.json();
    state.expenses = data.expenses || [];
    renderExpenses(state.expenses);
  } catch(e) {
    $('panel-expense').innerHTML = '<div class="empty">데이터 불러오기 실패</div>';
  }
}

function renderExpenses(list) {
  if (!list.length) {
    $('panel-expense').innerHTML = '<div class="empty">지출 데이터 없음</div>';
    return;
  }
  const total = list.reduce((s, e) => s + (e.amount || 0), 0);

  // 계정과목(subCategory)별 그룹
  const groups = {};
  list.forEach(e => {
    const key = e.subCategory || e.category || '기타';
    if (!groups[key]) groups[key] = { amount: 0, items: [] };
    groups[key].amount += e.amount || 0;
    groups[key].items.push(e);
  });
  const sorted = Object.entries(groups).sort((a, b) => b[1].amount - a[1].amount);
  const maxAmt = sorted[0][1].amount;

  let html = `<div class="section-label">${state.year}년 ${state.month}월 · 총 ${list.length}건</div>
  <div class="card">
    <div class="card-head">총 지출 <span class="card-head-amt" style="color:#f87171;">${total.toLocaleString()}원</span></div>`;

  sorted.forEach(([catName, { amount, items }], idx) => {
    const bp = maxAmt > 0 ? (amount / maxAmt * 100).toFixed(0) : 0;
    const catId = 'cat_' + idx;
    html += `<div style="border-bottom:1px solid #0f172a;">
      <div class="exp-cat-header" onclick="toggleExpCat('${catId}')">
        <span class="exp-cat-name">▶ ${catName} <span style="font-size:11px;color:#64748b;">(${items.length}건)</span></span>
        <span class="exp-cat-amt">${amount.toLocaleString()}원</span>
      </div>
      <div style="padding:0 14px 6px;"><div class="bar-bg"><div class="bar-fill" style="width:${bp}%;background:#ef4444;"></div></div></div>
      <div class="exp-items" id="${catId}">`;
    items.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(e => {
      html += `<div class="exp-item">
        <div class="exp-item-left">
          <div style="font-size:12px;color:#cbd5e1;">${e.vendor || '-'}</div>
          <div class="exp-item-date">${e.date}</div>
        </div>
        <div class="exp-item-amt">${(e.amount||0).toLocaleString()}원</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += '</div>';
  $('panel-expense').innerHTML = html;
}

function toggleExpCat(id) {
  const el = $(id);
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
  const btn = el.previousElementSibling?.previousElementSibling;
  if (btn) btn.querySelector('.exp-cat-name').textContent = (isOpen ? '▶' : '▼') + btn.querySelector('.exp-cat-name').textContent.slice(1);
}

// ── 고객 현황 ───────────────────────────────────────────────
async function loadCustomers() {
  if (state.customers) { renderCustomers(state.customers); return; }
  $('panel-customer').innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res  = await fetch(`/api/daily/customer-sales?month=${ym()}`);
    const data = await res.json();
    state.customers = data.customers || [];
    renderCustomers(state.customers);
  } catch(e) {
    $('panel-customer').innerHTML = '<div class="empty">데이터 불러오기 실패</div>';
  }
}

function setCustFilter(f, btn) {
  state.custFilter = f;
  document.querySelectorAll('.m-filter').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  renderCustomers(state.customers || []);
}

function renderCustomers(list) {
  if (!list.length) {
    $('panel-customer').innerHTML = '<div class="empty">고객 데이터 없음</div>';
    return;
  }
  const avgBuy = state.avgBuy;

  const filtered = state.custFilter === '전체' ? list
    : state.custFilter === '외상'  ? list.filter(c => c.payType === '외상')
    : state.custFilter === '카드'  ? list.filter(c => c.payType === '신용카드')
    : list.filter(c => c.payType === '현금');

  const total = { qty: 0, amt: 0, profit: 0 };
  const rows = filtered.map((c, i) => {
    let custProfit = 0;
    for (const [fuel, fd] of Object.entries(c.fuels || {})) {
      const buy = avgBuy[fuel] || 0;
      if (buy && fd.qty > 0) custProfit += fd.amount - fd.qty * buy;
    }
    custProfit = Math.round(custProfit);
    const qty = c.totalQty || 0;
    const avgSell = qty > 0 ? Math.round(c.totalAmount / qty) : null;
    const pct     = c.totalAmount > 0 ? (custProfit / c.totalAmount * 100).toFixed(1) : '-';
    const pcls    = custProfit >= 0 ? 'pos' : 'neg';
    total.qty    += qty;
    total.amt    += c.totalAmount;
    total.profit += custProfit;
    const badge = c.payType === '외상' ? '<span class="badge-c">외상</span>'
      : c.payType === '신용카드' ? '<span class="badge-k">카드</span>'
      : '<span class="badge-h">현금</span>';
    return `<tr>
      <td>${i+1}</td>
      <td title="${c.name}">${c.name}</td>
      <td style="text-align:center;">${badge}</td>
      <td>${qty > 0 ? Math.floor(qty).toLocaleString()+'L' : '-'}</td>
      <td>${avgSell ? avgSell.toLocaleString()+'원' : '-'}</td>
      <td style="font-weight:600;">${Math.round(c.totalAmount).toLocaleString()}원</td>
      <td class="${pcls}" style="font-weight:700;">${custProfit.toLocaleString()}원</td>
      <td class="${pcls}" style="font-size:11px;">${pct}%</td>
    </tr>`;
  });

  const totPcls = total.profit >= 0 ? 'pos' : 'neg';
  const totPct  = total.amt > 0 ? (total.profit / total.amt * 100).toFixed(1) : '-';

  $('panel-customer').innerHTML = `
    <div class="filter-bar">
      <button class="m-filter ${state.custFilter==='전체'?'active':''}" data-f="전체" onclick="setCustFilter('전체',this)">전체</button>
      <button class="m-filter ${state.custFilter==='외상'?'active':''}" data-f="외상" onclick="setCustFilter('외상',this)">외상</button>
      <button class="m-filter ${state.custFilter==='카드'?'active':''}" data-f="카드" onclick="setCustFilter('카드',this)">카드</button>
      <button class="m-filter ${state.custFilter==='현금'?'active':''}" data-f="현금" onclick="setCustFilter('현금',this)">현금</button>
      <span style="margin-left:auto;font-size:11px;color:#475569;align-self:center;">${filtered.length}개 업체</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="cust-table">
        <thead><tr><th>#</th><th>업체명</th><th>구분</th><th>판매량</th><th>판매가</th><th>매출</th><th>영업이익</th><th>이익률</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
        <tfoot><tr style="background:#1e293b;font-weight:700;border-top:1px solid #475569;">
          <td colspan="3" style="padding:8px;color:#94a3b8;text-align:left;">합계</td>
          <td>${total.qty > 0 ? Math.floor(total.qty).toLocaleString()+'L' : '-'}</td>
          <td>-</td>
          <td style="font-weight:700;">${Math.round(total.amt).toLocaleString()}원</td>
          <td class="${totPcls}" style="font-weight:700;">${Math.round(total.profit).toLocaleString()}원</td>
          <td class="${totPcls}" style="font-size:11px;">${totPct}%</td>
        </tr></tfoot>
      </table>
    </div>`;
}
</script>
</body>
</html>
