<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지출목록 — 미소주유소</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #f1f5f9; color: #1e293b; font-size: 14px; }

    /* ── 헤더 ── */
    header {
      background: #1e293b;
      color: #fff;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    .header-links { display: flex; gap: 16px; }
    .header-links a {
      color: #94a3b8;
      font-size: 13px;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 4px;
      transition: background .15s;
    }
    .header-links a:hover { background: rgba(255,255,255,.1); color: #fff; }

    main { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }

    /* ── 상태 배너 ── */
    #banner {
      display: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    #banner.ok   { background: #dcfce7; color: #15803d; display: block; }
    #banner.err  { background: #fee2e2; color: #dc2626; display: block; }
    #banner.info { background: #dbeafe; color: #1e40af; display: block; }

    /* ── 업로드 섹션 ── */
    .upload-section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .upload-section h2 { font-size: 14px; font-weight: 700; color: #475569; min-width: 80px; }
    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-upload:hover { background: #15803d; }
    .btn-upload:disabled { background: #86efac; cursor: wait; }
    .upload-info { font-size: 12px; color: #64748b; }

    /* ── 월별 요약 카드 ── */
    .month-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .month-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .month-card:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,.15); }
    .month-card.active { border-color: #2563eb; background: #eff6ff; }
    .month-card .mo-label { font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 6px; }
    .month-card .mo-count { font-size: 11px; color: #94a3b8; }
    .month-card .mo-total { font-size: 15px; font-weight: 700; color: #1e293b; margin-top: 4px; }

    /* ── 상세 리스트 패널 ── */
    .detail-panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .detail-header h2 { font-size: 15px; font-weight: 700; }
    .detail-meta { font-size: 12px; color: #64748b; }

    /* 필터 바 */
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px 20px;
      border-bottom: 1px solid #f1f5f9;
      background: #fafafa;
    }
    .filter-bar select, .filter-bar input {
      padding: 5px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
    }
    .filter-bar label { font-size: 12px; color: #64748b; }

    /* 테이블 */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      padding: 8px 12px;
      background: #f1f5f9;
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      color: #475569;
      border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
      position: sticky;
      top: 52px;
    }
    td { padding: 9px 12px; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8fafc; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-fixed { background: #dbeafe; color: #1e40af; }
    .badge-var   { background: #dcfce7; color: #15803d; }

    .col-num    { text-align: right; font-weight: 600; white-space: nowrap; }
    .col-date   { color: #64748b; white-space: nowrap; min-width: 90px; }
    .col-vendor { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #e2e8f0; }
    th.sort-asc  { color: #2563eb; }
    th.sort-desc { color: #2563eb; }
    .sort-icon { margin-left: 4px; font-size: 11px; color: #94a3b8; }
    th.sort-asc  .sort-icon, th.sort-desc .sort-icon { color: #2563eb; }

    .btn-del {
      padding: 3px 10px;
      font-size: 11px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-del:hover { background: #b91c1c; }

    .total-row td {
      background: #f1f5f9;
      font-weight: 700;
      border-top: 2px solid #e2e8f0;
    }

    .empty-msg { padding: 40px; text-align: center; color: #94a3b8; }

    .no-data {
      padding: 60px 20px;
      text-align: center;
      color: #94a3b8;
    }
    .no-data .no-data-icon { font-size: 40px; margin-bottom: 12px; }
    .no-data p { font-size: 14px; line-height: 1.8; }

    /* 반응형 */
    @media (max-width: 600px) {
      main { padding: 12px; }
      .month-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    }
  </style>
</head>
<body>

<header>
  <h1>⛽ 지출목록 — 미소주유소</h1>
  <div class="header-links">
    <a href="/">← 메인</a>
    <a href="/?tab=summary" id="link-summary">📊 종합 보고서</a>
  </div>
</header>

<main>

  <div id="banner"></div>

  <!-- ── 업로드 섹션 ── -->
  <div class="upload-section">
    <h2>💳 지출 업로드</h2>
    <div>
      <input type="file" id="bank-expense-input" accept=".xls,.xlsx" hidden>
      <button class="btn-upload" id="btn-upload" onclick="document.getElementById('bank-expense-input').click()">
        📥 수시입출예금 업로드
      </button>
      <div class="upload-info" id="upload-info" style="margin-top:6px;">
        하나은행 수시입출예금 입출금내역 Excel 파일 (.xls / .xlsx)
      </div>
    </div>
  </div>

  <!-- ── 월별 요약 카드 ── -->
  <div id="month-grid" class="month-grid"></div>

  <!-- ── 상세 리스트 ── -->
  <div id="detail-panel" class="detail-panel" style="display:none;">
    <div class="detail-header">
      <h2 id="detail-title">상세 내역</h2>
      <span class="detail-meta" id="detail-meta"></span>
    </div>
    <div class="filter-bar">
      <label>분류</label>
      <select id="filter-cat">
        <option value="">전체</option>
        <option value="고정비">고정비</option>
        <option value="변동비">변동비</option>
      </select>
      <label>계정과목</label>
      <select id="filter-sub"></select>
      <label>검색</label>
      <input type="text" id="filter-search" placeholder="업체명 검색" style="width:140px;">
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th class="col-date sortable" onclick="setSort('date')" id="th-date">
              날짜 <span class="sort-icon">↕</span>
            </th>
            <th>계정과목</th>
            <th>분류</th>
            <th>업체</th>
            <th class="sortable" style="text-align:right;min-width:110px;" onclick="setSort('amount')" id="th-amount">
              금액 <span class="sort-icon">↕</span>
            </th>
            <th style="min-width:40px;"></th>
          </tr>
        </thead>
        <tbody id="detail-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 데이터 없을 때 안내 -->
  <div id="no-data-msg" class="no-data" style="display:none;">
    <div class="no-data-icon">📂</div>
    <p>아직 지출 데이터가 없습니다.<br>수시입출예금 파일을 업로드하면<br>1월~6월 지출 내역이 자동으로 정리됩니다.</p>
  </div>

</main>

<script>
'use strict';

let allData     = [];      // 전체 지출 항목
let monthData   = {};      // { '2026-01': [...], '2026-02': [...] }
let activeMonth = null;    // 현재 선택된 월
let sortCol     = 'date';  // 정렬 컬럼: 'date' | 'amount'
let sortDir     = 'desc';  // 정렬 방향: 'asc' | 'desc'

// ── 유틸 ─────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function won(n) { return Number(n || 0).toLocaleString() + '원'; }
function showBanner(msg, type) {
  const el = document.getElementById('banner');
  el.textContent = msg;
  el.className = type;
  if (type !== 'err') setTimeout(() => { el.className = ''; el.style.display = 'none'; }, 4000);
}

// ── 데이터 로드 ───────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('/api/expenses');
    const data = await res.json();
    if (!data.ok) { showBanner('조회 실패: ' + data.error, 'err'); return; }

    allData = data.expenses || [];
    buildMonthData();
    renderMonthGrid();
  } catch(e) {
    showBanner('서버 연결 실패: ' + e.message, 'err');
  }
}

function buildMonthData() {
  monthData = {};
  allData.forEach(e => {
    const m = e.month || '';
    if (!monthData[m]) monthData[m] = [];
    monthData[m].push(e);
  });
}

// ── 월별 카드 렌더링 ─────────────────────────────────────────
function renderMonthGrid() {
  const grid  = document.getElementById('month-grid');
  const noMsg = document.getElementById('no-data-msg');

  const months = Object.keys(monthData).sort().reverse();

  if (!months.length) {
    grid.innerHTML = '';
    noMsg.style.display = 'block';
    document.getElementById('detail-panel').style.display = 'none';
    return;
  }

  noMsg.style.display = 'none';

  // 전체 합계 카드
  const totalCount = allData.length;
  const totalAmt   = allData.reduce((s, e) => s + (e.amount || 0), 0);

  grid.innerHTML = `
    <div class="month-card ${!activeMonth ? 'active' : ''}" onclick="selectMonth(null)">
      <div class="mo-label">📊 전체</div>
      <div class="mo-count">${totalCount}건</div>
      <div class="mo-total">${totalAmt.toLocaleString()}원</div>
    </div>
  ` + months.map(m => {
    const items = monthData[m];
    const cnt   = items.length;
    const total = items.reduce((s, e) => s + (e.amount || 0), 0);
    const label = m.replace(/^2026-0?/, '') + '월';  // "2026-01" → "1월"
    return `
      <div class="month-card ${activeMonth === m ? 'active' : ''}" onclick="selectMonth('${m}')">
        <div class="mo-label">${label}</div>
        <div class="mo-count">${cnt}건</div>
        <div class="mo-total">${total.toLocaleString()}원</div>
      </div>
    `;
  }).join('');

  // 활성 월이 있으면 상세 표시
  if (activeMonth !== undefined) renderDetail();
}

// ── 월 선택 ──────────────────────────────────────────────────
function selectMonth(month) {
  activeMonth = month;
  renderMonthGrid();
  renderDetail();
}

// ── 상세 리스트 렌더링 ───────────────────────────────────────
function renderDetail() {
  const panel  = document.getElementById('detail-panel');
  const title  = document.getElementById('detail-title');
  const meta   = document.getElementById('detail-meta');
  const tbody  = document.getElementById('detail-tbody');
  const subSel = document.getElementById('filter-sub');

  const src = activeMonth ? (monthData[activeMonth] || []) : allData;

  const label = activeMonth
    ? activeMonth.replace(/^2026-0?/, '') + '월 지출 내역'
    : '전체 지출 내역';
  title.textContent = label;
  panel.style.display = 'block';

  // 계정과목 필터 목록 갱신
  const subs = [...new Set(src.map(e => e.subCategory || '기타'))].sort();
  const prevSub = subSel.value;
  subSel.innerHTML = '<option value="">전체</option>' +
    subs.map(s => `<option value="${s}" ${s === prevSub ? 'selected' : ''}>${s}</option>`).join('');

  applyDetailFilter(src, meta, tbody);
}

function applyDetailFilter(src, metaEl, tbody) {
  const cat    = document.getElementById('filter-cat').value;
  const sub    = document.getElementById('filter-sub').value;
  const search = document.getElementById('filter-search').value.trim().toLowerCase();

  const filtered = src.filter(e =>
    (!cat    || e.category    === cat) &&
    (!sub    || e.subCategory === sub) &&
    (!search || (e.vendor||'').toLowerCase().includes(search))
  );

  const total = filtered.reduce((s, e) => s + (e.amount || 0), 0);

  if (metaEl) metaEl.textContent = `${filtered.length}건 · 합계 ${total.toLocaleString()}원`;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">해당 조건의 내역이 없습니다.</td></tr>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => {
    if (sortCol === 'amount') {
      return sortDir === 'asc' ? (a.amount||0) - (b.amount||0) : (b.amount||0) - (a.amount||0);
    }
    // date
    const da = a.date || a.month || '';
    const db = b.date || b.month || '';
    return sortDir === 'asc' ? da.localeCompare(db) : db.localeCompare(da);
  });

  const SUB_CATS = ['임대료','카드비','이자','전력비','기장비','신용보증','세금','자동차세','유외상품','운영비','수도비','커피','보험비','퇴직금','협회비','급여','비품','경조금','기타'];

  tbody.innerHTML = sorted.map((e) => {
    const origIdx = allData.indexOf(e);
    const subOpts = SUB_CATS.map(s =>
      `<option value="${s}" ${e.subCategory === s ? 'selected' : ''}>${s}</option>`
    ).join('');
    return `
      <tr>
        <td class="col-date">${esc(e.date || e.month || '')}</td>
        <td>
          <select class="sel-sub" style="border:1px solid #e2e8f0;border-radius:4px;padding:2px 6px;font-size:12px;color:#1e293b;"
                  onchange="updateItem(${origIdx},'subCategory',this.value)">
            ${subOpts}
          </select>
        </td>
        <td>
          <select class="sel-cat" style="border:1px solid #e2e8f0;border-radius:4px;padding:2px 6px;font-size:12px;"
                  onchange="updateItem(${origIdx},'category',this.value)">
            <option value="고정비" ${e.category==='고정비'?'selected':''}>고정비</option>
            <option value="변동비" ${e.category==='변동비'?'selected':''}>변동비</option>
          </select>
        </td>
        <td class="col-vendor" title="${esc(e.vendor || '')}">${esc(e.vendor || '')}</td>
        <td class="col-num">${won(e.amount)}</td>
        <td><button class="btn-del" onclick="deleteItem(${origIdx})">삭제</button></td>
      </tr>
    `;
  }).join('') + `
    <tr class="total-row">
      <td colspan="4">합계 (${filtered.length}건)</td>
      <td class="col-num">${won(total)}</td>
      <td></td>
    </tr>
  `;
}

// ── 정렬 ─────────────────────────────────────────────────────
function setSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = col === 'date' ? 'desc' : 'desc';  // 날짜는 최신순, 금액은 높은순 기본
  }
  updateSortHeaders();
  const src = activeMonth ? (monthData[activeMonth] || []) : allData;
  applyDetailFilter(src, document.getElementById('detail-meta'), document.getElementById('detail-tbody'));
}

function updateSortHeaders() {
  ['date', 'amount'].forEach(col => {
    const th   = document.getElementById(`th-${col}`);
    const icon = th?.querySelector('.sort-icon');
    if (!th || !icon) return;
    if (sortCol === col) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      th.classList.remove(sortDir === 'asc' ? 'sort-desc' : 'sort-asc');
      icon.textContent = sortDir === 'asc' ? '↑' : '↓';
    } else {
      th.classList.remove('sort-asc', 'sort-desc');
      icon.textContent = '↕';
    }
  });
}

// ── 항목 수정 (계정과목 / 분류 드롭다운) ─────────────────────
async function updateItem(idx, field, value) {
  const e = allData[idx];
  if (!e) return;
  e[field] = value;  // 클라이언트 즉시 반영
  try {
    await fetch('/api/expenses/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month: e.month, date: e.date || '', vendor: e.vendor, amount: e.amount, field, value }),
    });
    buildMonthData();  // 카드 집계 갱신
    renderMonthGrid();
  } catch { /* 서버 오류 시 무시 (클라이언트 값은 이미 바뀜) */ }
}

// ── 필터 이벤트 ───────────────────────────────────────────────
['filter-cat', 'filter-sub', 'filter-search'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    const src = activeMonth ? (monthData[activeMonth] || []) : allData;
    applyDetailFilter(src, document.getElementById('detail-meta'), document.getElementById('detail-tbody'));
  });
});
document.getElementById('filter-search').addEventListener('input', () => {
  const src = activeMonth ? (monthData[activeMonth] || []) : allData;
  applyDetailFilter(src, document.getElementById('detail-meta'), document.getElementById('detail-tbody'));
});

// ── 삭제 ─────────────────────────────────────────────────────
async function deleteItem(idx) {
  const e = allData[idx];
  if (!e) return;
  if (!confirm(`삭제하시겠습니까?\n${e.date || e.month} · ${e.vendor}\n${won(e.amount)}`)) return;
  try {
    const res  = await fetch('/api/expenses/delete', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month: e.month, date: e.date || '', vendor: e.vendor, amount: e.amount }),
    });
    const data = await res.json();
    if (data.ok) {
      allData.splice(idx, 1);
      buildMonthData();
      renderMonthGrid();
      showBanner('✅ 삭제 완료', 'ok');
    } else {
      showBanner('삭제 실패: ' + data.error, 'err');
    }
  } catch(e) { showBanner('서버 오류', 'err'); }
}

// ── 수시입출예금 업로드 ───────────────────────────────────────
document.getElementById('bank-expense-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;

  const btn  = document.getElementById('btn-upload');
  const info = document.getElementById('upload-info');
  btn.disabled = true;
  btn.textContent = '⏳ 업로드 중…';
  info.textContent = `처리 중: ${file.name}`;
  showBanner('업로드 및 파싱 중…', 'info');

  const form = new FormData();
  form.append('file', file);

  try {
    const res  = await fetch('/api/upload-bank-expenses', { method: 'POST', body: form });
    const data = await res.json();

    if (data.ok) {
      info.textContent = `✅ ${data.count}건 임포트 완료 (${(data.months||[]).map(m=>m.replace(/^2026-0?/,'')+' 월').join(', ')})`;
      showBanner(`✅ ${data.count}건 지출 데이터 임포트 완료`, 'ok');
      activeMonth = null;
      await loadData();           // 전체 새로고침
    } else {
      info.textContent = '❌ 업로드 실패: ' + data.error;
      showBanner('업로드 실패: ' + data.error, 'err');
    }
  } catch(err) {
    info.textContent = '❌ 서버 연결 실패';
    showBanner('서버 연결 실패: ' + err.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = '📥 수시입출예금 업로드';
  e.target.value = '';
});

// ── 종합 탭 링크 ─────────────────────────────────────────────
// 메인 앱으로 돌아갈 때 종합 탭 활성화하도록 URL 파라미터 전달
document.getElementById('link-summary').href = '/?group=summary';

// ── 페이지 로드 ───────────────────────────────────────────────
loadData();
</script>
